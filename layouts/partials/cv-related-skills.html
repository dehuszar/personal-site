{{ `<!-- partials/cv-skills.html -->` | safeHTML }}
<article class="cv-related-skills">
  <header><h3>Related Skills</h3></header>
  <ul>
    {{ with .Params.skills }} {{ range . }}
    <li>
      <a href="/cv/skill/{{ . }}">{{ replace . "-" " " | title }}</a>
    </li>
    {{ end }} {{ end }}
  </ul>
</article>
