{{ `<!-- partials/cv-experience.html -->` | safeHTML }}
<article class="cv-related-experience">
  <header>
    <h3>Related Experience</h3>
  </header>
  <ul>
    {{ with .Params.experience }} {{ range . }}
    <li>
      <a href="/cv/experience/{{ . }}">{{ replace . "-" " " | title }}</a>
    </li>
    {{ end }} {{ end }}
  </ul>
</article>
