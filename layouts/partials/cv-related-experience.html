{{ `<!-- partials/cv-experience.html -->` | safeHTML }} {{ with
.Params.experience }}
<article class="cv-related-experience">
  <header>
    <h3>Related Experience</h3>
  </header>
  <ul>
    {{ range . }}
    <li>
      <a href="/cv/experience/{{ . }}">{{ replace . "-" " " | title }}</a>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
